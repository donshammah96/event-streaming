name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      nats:
        image: nats:latest
        ports:
          - 4422:4222

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        working-directory: ./dashboard
        run: pnpm install --frozen-lockfile

      - name: Run Build
        working-directory: ./dashboard
        run: pnpm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ynzwtquhhzpjnzxgbrxe.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_B5bZYSzNKxnrPr3yukz1JA_XJEvfo7e
          NATS_URL: nats://localhost:4422

      - name: Run Integration Tests
        working-directory: ./dashboard
        run: npx tsx src/__tests__/api.test.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://ynzwtquhhzpjnzxgbrxe.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_B5bZYSzNKxnrPr3yukz1JA_XJEvfo7e
          NATS_URL: nats://localhost:4422
