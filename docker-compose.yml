
services:
  nats:
    image: nats:2.10-alpine  # pinned — unpinned :latest causes non-reproducible builds
    container_name: event-streaming-nats
    ports:
      - "4222:4222"  # Host 4222 → Container 4222 (avoids Windows port reservation range)
      - "8722:8222"  # NATS monitoring / healthz endpoint (avoids Windows port reservation range)
    command: "-js -m 8222"
    restart: unless-stopped
    networks:
      - event-net
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine  # pinned — consistent with Supabase's pg16 default
    container_name: event-streaming-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: event_streaming
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - event-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d event_streaming"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  event-net:
    driver: bridge

volumes:
  postgres_data:
